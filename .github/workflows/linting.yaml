name: Linting and Formatting

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "web/**"
      - "scripts/**"
      - "tests/**"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - ".github/workflows/linting.yaml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "web/**"
      - "scripts/**"
      - "tests/**"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - ".github/workflows/linting.yaml"

jobs:
  python-lint:
    name: Python Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit tomli

      - name: Run pre-commit on Python files
        run: |
          echo "🔍 Running pre-commit hooks on Python files..."
          pre-commit run --all-files --verbose

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./web
        run: npm ci

      - name: Run ESLint
        working-directory: ./web
        run: npm run lint

      - name: TypeScript type check
        working-directory: ./web
        run: npx tsc --noEmit

  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [python-lint, frontend-lint]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🔍 Linting Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python (pre-commit) | ${{ needs.python-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (ESLint + TypeScript) | ${{ needs.frontend-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if linting failed
        if: needs.python-lint.result == 'failure' || needs.frontend-lint.result == 'failure'
        run: exit 1
