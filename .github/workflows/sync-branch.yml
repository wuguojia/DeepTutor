name: Sync Branch

on:
  # Run automatically every 4 hours
  schedule:
    - cron: '0 */4 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main to sync branch
        run: |
          # Check whether the sync branch exists
          if git ls-remote --heads origin sync | grep -q sync; then
            echo "sync branch exists, updating..."
          else
            echo "sync branch does not exist, creating..."
          fi

          # Force-push main branch contents to sync branch
          git push origin main:sync --force

          echo "✅ Successfully synced main branch to sync branch"
